name: Deploy API (Laravel) to Hostinger

# Rsyncs the Laravel app into a folder OUTSIDE public_html, then runs composer +
# migrations over SSH. The API is served as a subpath of the main domain:
# public_html/backend is a symlink to <API_TARGET>/public.
on:
  push:
    branches: [main]
    paths:
      - "api/**"
      - ".github/workflows/deploy-api.yml"
  workflow_dispatch:

concurrency:
  group: deploy-api
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup SSH key
        run: |
          mkdir -p "$HOME/.ssh"
          # The key is stored base64-encoded in the SSH_KEY_B64 secret so that
          # copy/paste can't corrupt it (no CRLF / whitespace issues that cause
          # "error in libcrypto"). Decode it back to the real private key here.
          echo "${{ secrets.SSH_KEY_B64 }}" | base64 -d > "$HOME/.ssh/deploy_key"
          chmod 600 "$HOME/.ssh/deploy_key"

      - name: Rsync Laravel app to server
        run: |
          rsync -rltgoDzvO \
            --exclude='/.env' --exclude='/vendor/' --exclude='/node_modules/' \
            --exclude='/storage/' --exclude='/database/database.sqlite' \
            --exclude='/.git/' --exclude='/tests/' \
            -e "ssh -p ${{ secrets.SSH_PORT }} -i $HOME/.ssh/deploy_key -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null" \
            api/ "${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:${{ secrets.API_TARGET }}/"

      - name: Composer install, migrate, cache (over SSH)
        run: |
          ssh -p ${{ secrets.SSH_PORT }} -i "$HOME/.ssh/deploy_key" \
            -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null \
            "${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}" \
            "cd ${{ secrets.API_TARGET }} && \
             composer install --no-dev --optimize-autoloader --no-interaction && \
             php artisan migrate --force && \
             php artisan config:cache && \
             (php artisan storage:link || true)"
          # NOTE: no route:cache — routes/api.php uses closure routes that
          # cannot be serialized (would error out the deploy).
