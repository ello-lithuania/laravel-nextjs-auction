name: Deploy API (Laravel) to Hostinger

# Runs on a SELF-HOSTED runner (your PC), because Hostinger blocks GitHub's
# cloud runner IPs. Deploys from your machine's IP, which Hostinger allows.
# Only secret needed: SSH_KEY_B64 (base64-encoded private key).
on:
  push:
    branches: [main]
    paths:
      - "api/**"
      - ".github/workflows/deploy-api.yml"
  workflow_dispatch:

concurrency:
  group: deploy-api
  cancel-in-progress: false

env:
  SSH_HOST: "46.202.142.44"
  SSH_PORT: "65002"
  SSH_USER: "u984572075"
  API_DIR: "/home/u984572075/laravel-api"
  WEB_DIR: "/home/u984572075/domains/plum-mouse-764078.hostingersite.com/public_html"
  SSH_FLAGS: "-o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null -o ConnectTimeout=20"

jobs:
  deploy:
    runs-on: self-hosted
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v4

      - name: Setup SSH key
        run: |
          mkdir -p "$HOME/.ssh"
          echo "${{ secrets.SSH_KEY_B64 }}" | base64 -d > "$HOME/.ssh/deploy_key"
          chmod 600 "$HOME/.ssh/deploy_key"

      - name: Upload Laravel + composer + migrate (tar over ssh)
        run: |
          SSH="ssh -p $SSH_PORT -i $HOME/.ssh/deploy_key $SSH_FLAGS $SSH_USER@$SSH_HOST"
          tar czf - -C api \
            --exclude='./vendor' --exclude='./node_modules' --exclude='./.env' \
            --exclude='./.git' --exclude='./storage/logs' \
            --exclude='./database/database.sqlite' --exclude='./bootstrap/cache' . \
          | $SSH "mkdir -p '$API_DIR' && tar xzf - -C '$API_DIR' \
              && ln -sfn '$API_DIR/public' '$WEB_DIR/backend' \
              && cd '$API_DIR' \
              && composer install --no-dev --optimize-autoloader --no-interaction \
              && php artisan migrate --force \
              && php artisan config:cache"
