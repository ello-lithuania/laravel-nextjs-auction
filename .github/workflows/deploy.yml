name: Deploy

# Deploys over FTPS from a GitHub-hosted runner. (Hostinger blocks SSH from
# GitHub's cloud IPs, but FTPS works.) Two jobs run in parallel:
#   - frontend: build the Next.js static export -> public_html
#   - api:      upload the Laravel code -> laravel-api
#
# The FTP account must be the one scoped to the dekaukciona.lt domain folder so
# both /public_html/ and /laravel-api/ resolve correctly.
#
# Required secrets: FTP_USERNAME, FTP_PASSWORD (the server IP is hardcoded above
# since it's public). Get the FTP account in Hostinger hPanel -> Files -> FTP
# Accounts; it must be scoped to the dekaukciona.lt domain folder (not just
# public_html) so both /public_html/ and /laravel-api/ are reachable.
#
# NOT handled here (rare, run `bash deploy.sh api` from your PC when needed):
#   - composer install (only when you add/upgrade PHP packages)
#   - php artisan migrate (only when you add DB migrations)
# The server keeps its own .env, vendor/, storage/ and database — those are
# excluded below so a deploy never touches them.

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        working-directory: ./web
        run: npm ci

      - name: Build static export
        working-directory: ./web
        env:
          NEXT_TELEMETRY_DISABLED: "1"
          NEXT_PUBLIC_API_URL: ${{ vars.NEXT_PUBLIC_API_URL || 'https://dekaukciona.lt/backend' }}
          NEXT_PUBLIC_REVERB_APP_KEY: ${{ vars.NEXT_PUBLIC_REVERB_APP_KEY || 'auction-key' }}
          NEXT_PUBLIC_REVERB_HOST: ${{ vars.NEXT_PUBLIC_REVERB_HOST || 'dekaukciona.lt' }}
          NEXT_PUBLIC_REVERB_PORT: ${{ vars.NEXT_PUBLIC_REVERB_PORT || '443' }}
          NEXT_PUBLIC_REVERB_SCHEME: ${{ vars.NEXT_PUBLIC_REVERB_SCHEME || 'https' }}
        run: |
          npm run build
          cp deploy/public_html.htaccess out/.htaccess

      - name: Deploy frontend (FTPS)
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: 46.202.142.44   # public Hostinger IP (same as deploy.sh); not a secret
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./web/out/
          server-dir: /public_html/
          protocol: ftps
          port: 21
          timeout: 60000

  deploy-api:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Deploy API (FTPS)
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: 46.202.142.44   # public Hostinger IP (same as deploy.sh); not a secret
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./api/
          server-dir: /laravel-api/
          protocol: ftps
          port: 21
          # Long control-socket timeout: the first sync into laravel-api/ is slow
          # over FTPS (the dir also holds a big vendor/ from the SSH deploy).
          timeout: 600000
          # Server-managed things are never overwritten/removed:
          exclude: |
            **/.git*
            **/.git*/**
            **/node_modules/**
            **/vendor/**
            .env
            .env.example
            **/storage/**
            public/uploads/**
            database/database.sqlite
            tests/**
            bootstrap/cache/**
