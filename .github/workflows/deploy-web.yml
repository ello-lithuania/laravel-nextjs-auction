name: Deploy Web (Next static) to Hostinger

# Runs on a SELF-HOSTED runner (your PC). Builds the static export and uploads
# it to public_html over SSH (tar over ssh; no rsync needed on Windows).
# Only secret needed: SSH_KEY_B64.
# Manual-only. GitHub-hosted runners are blocked by Hostinger's firewall, and a
# self-hosted runner is not recommended on a public repo. The recommended deploy
# method is ./deploy.sh web (or double-click deploy.bat) from your machine.
on:
  workflow_dispatch:

concurrency:
  group: deploy-web
  cancel-in-progress: true

env:
  SSH_HOST: "46.202.142.44"
  SSH_PORT: "65002"
  SSH_USER: "u984572075"
  WEB_DIR: "/home/u984572075/domains/plum-mouse-764078.hostingersite.com/public_html"
  SSH_FLAGS: "-o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null -o ConnectTimeout=20"

jobs:
  deploy:
    runs-on: self-hosted
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v4

      - name: Build static export
        working-directory: web
        env:
          NEXT_TELEMETRY_DISABLED: "1"
          NEXT_PUBLIC_API_URL: ${{ vars.NEXT_PUBLIC_API_URL || 'https://plum-mouse-764078.hostingersite.com/backend' }}
          NEXT_PUBLIC_REVERB_APP_KEY: ${{ vars.NEXT_PUBLIC_REVERB_APP_KEY || 'auction-key' }}
          NEXT_PUBLIC_REVERB_HOST: ${{ vars.NEXT_PUBLIC_REVERB_HOST || 'plum-mouse-764078.hostingersite.com' }}
          NEXT_PUBLIC_REVERB_PORT: ${{ vars.NEXT_PUBLIC_REVERB_PORT || '443' }}
          NEXT_PUBLIC_REVERB_SCHEME: ${{ vars.NEXT_PUBLIC_REVERB_SCHEME || 'https' }}
        run: |
          npm ci
          npm run build

      - name: Setup SSH key
        run: |
          mkdir -p "$HOME/.ssh"
          echo "${{ secrets.SSH_KEY_B64 }}" | base64 -d > "$HOME/.ssh/deploy_key"
          chmod 600 "$HOME/.ssh/deploy_key"

      - name: Upload static site to public_html (tar over ssh)
        run: |
          cp web/deploy/public_html.htaccess web/out/.htaccess
          SSH="ssh -p $SSH_PORT -i $HOME/.ssh/deploy_key $SSH_FLAGS $SSH_USER@$SSH_HOST"
          # tar-extract over the existing files; the `backend` symlink (API) is
          # left untouched (tar doesn't delete).
          tar czf - -C web/out . | $SSH "tar xzf - -C '$WEB_DIR'"
