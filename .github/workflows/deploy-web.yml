name: Deploy Web (Next static) to Hostinger

# Builds the Next.js app as a static export and rsyncs it into public_html.
on:
  push:
    branches: [main]
    paths:
      - "web/**"
      - ".github/workflows/deploy-web.yml"
  workflow_dispatch:

concurrency:
  group: deploy-web
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        working-directory: web
        run: npm ci

      - name: Build static export
        working-directory: web
        # NEXT_PUBLIC_* are baked into the static bundle at build time. Set them
        # as GitHub repository Variables (Settings -> Secrets and variables ->
        # Actions -> Variables). They are public (they ship to the browser).
        env:
          NEXT_PUBLIC_API_URL: ${{ vars.NEXT_PUBLIC_API_URL }}
          NEXT_PUBLIC_REVERB_APP_KEY: ${{ vars.NEXT_PUBLIC_REVERB_APP_KEY }}
          NEXT_PUBLIC_REVERB_HOST: ${{ vars.NEXT_PUBLIC_REVERB_HOST }}
          NEXT_PUBLIC_REVERB_PORT: ${{ vars.NEXT_PUBLIC_REVERB_PORT }}
          NEXT_PUBLIC_REVERB_SCHEME: ${{ vars.NEXT_PUBLIC_REVERB_SCHEME }}
        run: npm run build

      - name: Bundle server .htaccess into the output
        run: cp web/deploy/public_html.htaccess web/out/.htaccess

      - name: Setup SSH key
        run: |
          mkdir -p "$HOME/.ssh"
          printf '%s\n' "${{ secrets.SSH_PRIVATE_KEY }}" > "$HOME/.ssh/deploy_key"
          chmod 600 "$HOME/.ssh/deploy_key"

      - name: Rsync static site to public_html
        run: |
          # --delete keeps public_html in sync; --exclude protects the `backend`
          # symlink (-> Laravel public) that serves the API on the same domain.
          rsync -rltgoDzvO --delete --exclude='backend' \
            -e "ssh -p ${{ secrets.SSH_PORT }} -i $HOME/.ssh/deploy_key -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null" \
            web/out/ "${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:${{ secrets.WEB_TARGET }}/"
