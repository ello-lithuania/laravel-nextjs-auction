name: Deploy Web (Next static) to Hostinger

# Builds the Next.js app as a static export and rsyncs it into public_html.
# Only ONE secret is needed: SSH_KEY_B64 (base64-encoded private key).
on:
  push:
    branches: [main]
    paths:
      - "web/**"
      - ".github/workflows/deploy-web.yml"
  workflow_dispatch:

concurrency:
  group: deploy-web
  cancel-in-progress: true

env:
  SSH_HOST: "46.202.142.44"
  SSH_PORT: "65002"
  SSH_USER: "u984572075"
  WEB_DIR: "/home/u984572075/domains/plum-mouse-764078.hostingersite.com/public_html"
  SSH_FLAGS: "-o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null -o ConnectTimeout=20"

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        working-directory: web
        run: npm ci

      - name: Build static export
        working-directory: web
        env:
          NEXT_PUBLIC_API_URL: ${{ vars.NEXT_PUBLIC_API_URL || 'https://plum-mouse-764078.hostingersite.com/backend' }}
          NEXT_PUBLIC_REVERB_APP_KEY: ${{ vars.NEXT_PUBLIC_REVERB_APP_KEY || 'auction-key' }}
          NEXT_PUBLIC_REVERB_HOST: ${{ vars.NEXT_PUBLIC_REVERB_HOST || 'plum-mouse-764078.hostingersite.com' }}
          NEXT_PUBLIC_REVERB_PORT: ${{ vars.NEXT_PUBLIC_REVERB_PORT || '443' }}
          NEXT_PUBLIC_REVERB_SCHEME: ${{ vars.NEXT_PUBLIC_REVERB_SCHEME || 'https' }}
        run: npm run build

      - name: Bundle server .htaccess into the output
        run: cp web/deploy/public_html.htaccess web/out/.htaccess

      - name: Setup SSH key
        run: |
          mkdir -p "$HOME/.ssh"
          echo "${{ secrets.SSH_KEY_B64 }}" | base64 -d > "$HOME/.ssh/deploy_key"
          chmod 600 "$HOME/.ssh/deploy_key"

      - name: Diagnose connectivity
        run: |
          echo "Runner public IP : $(curl -s --max-time 10 https://api.ipify.org || echo unknown)"
          echo "Target           : $SSH_HOST:$SSH_PORT"
          if timeout 12 bash -c "cat < /dev/null > /dev/tcp/$SSH_HOST/$SSH_PORT" 2>/dev/null; then
            echo "TCP connect      : OPEN  ✅"
          else
            echo "TCP connect      : BLOCKED/timeout  ❌"
          fi

      - name: Rsync static site to public_html
        run: |
          rsync -rltgoDzvO --delete --exclude='backend' \
            -e "ssh -p $SSH_PORT -i $HOME/.ssh/deploy_key $SSH_FLAGS" \
            web/out/ "$SSH_USER@$SSH_HOST:$WEB_DIR/"
